<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂心理測驗：深夜的寂寞唱片行</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #161616;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
            position: relative;
            overflow: hidden;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #222;
            position: absolute;
            top: 0;
            left: 0;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4081, #00e5ff);
            box-shadow: 0 0 8px #ff4081;
            transition: width 0.5s ease;
        }
        h1 {
            color: #ff4081;
            font-size: 26px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 64, 129, 0.2);
        }
        p.intro {
            line-height: 1.8;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .fade-in {
            animation: fadeInActive 0.6s ease forwards;
        }
        @keyframes fadeInActive {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-text {
            font-size: 20px;
            margin-bottom: 25px;
            color: #fff;
            font-weight: 500;
            line-height: 1.6;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 14px 0;
            background-color: #1f1f1f;
            color: #ccc;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: left;
        }
        .btn:hover {
            background-color: #252525;
            color: #fff;
            border-color: #ff4081;
            box-shadow: 0 0 12px rgba(255, 64, 129, 0.3);
            transform: translateY(-2px);
        }
        .result-title {
            color: #00e5ff;
            font-size: 22px;
            margin-top: 15px;
            font-weight: bold;
        }
        .song-title {
            font-size: 28px;
            color: #fff;
            margin: 25px 0;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,229,255,0.4);
        }
        .action-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        .yt-link { background-color: #ff0000; color: white; }
        .yt-link:hover { background-color: #cc0000; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .share-btn { background-color: #00e5ff; color: #0d0d0d; }
        .share-btn:hover { background-color: #00b2cc; box-shadow: 0 0 15px rgba(0,229,255,0.5); }
        .restart-btn {
            background-color: transparent;
            color: #888;
            border: 1px dashed #444;
            width: auto;
            padding: 10px 20px;
            margin: 20px auto 0 auto;
            text-align: center;
        }
        .restart-btn:hover { border-color: #aaa; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>
    <div id="content-box" class="fade-in"></div>
</div>

<script>
    // 儲存每首歌曲的分數
    let scores = {
        '黑色台北': 0, '天堂與泥土': 0, 'BREATHE': 0, 'TATTOO': 0,
        'ITEM': 0, 'Morse Code': 0, 'X Song': 0, 'Just Like This': 0,
        'Lisianthus': 0, 'I No': 0, '言不由衷': 0
    };

    const songDatabase = {
        '黑色台北': { status: '都市社畜的集體焦慮/厭世', desc: '被生活壓得喘不過氣，對這個城市有點失望，只想大聲宣洩。', url: 'https://www.youtube.com/results?search_query=荷爾蒙少年+黑色台北' },
        '天堂與泥土': { status: '徹底擺爛、沉澱的靈魂出竅', desc: '世界太吵了，現在只想躺平，讓意識像水一樣流動，什麼都不想管。', url: 'https://www.youtube.com/results?search_query=deca+joins+天堂與泥土' },
        'BREATHE': { status: '需要大哭、被溫柔擁抱的極度悲傷', desc: '你真的辛苦了。沒關係，想哭就哭吧，這首歌會陪著你慢慢呼吸。', url: 'https://www.youtube.com/results?search_query=Leehi+BREATHE' },
        'TATTOO': { status: '帶有高級感的孤獨', desc: '走在深夜的都市，雖然一個人有點寂寞，但我寂寞得很漂亮。', url: 'https://www.youtube.com/results?search_query=Mandark+TATTOO' },
        'ITEM': { status: '火冒三丈、全火力輸出的宣洩', desc: '少來煩我！現在滿腦子油門踩到底，用最強烈的重低音把不爽全部炸掉。', url: 'https://www.youtube.com/results?search_query=Stray+kids+ITEM' },
        'Morse Code': { status: '迷惘中帶點熱血的奔跑', desc: '雖然對未來有點不知所措，但血液裡的熱情還沒熄滅，衝就對了！', url: 'https://www.youtube.com/results?search_query=Dragon+Pony+Morse+Code' },
        'X Song': { status: '酸酸甜甜的戀愛腦/小傲嬌', desc: '心裡有個人讓你想東想西，有點煩躁，但又忍不住一直想他。', url: 'https://www.youtube.com/results?search_query=BOL4+X+Song' },
        'Just Like This': { status: '微醺微甜的微放空', desc: '今天不想動腦，只想吹著微風，享受一下 Me Time。', url: 'https://www.youtube.com/results?search_query=loco+just+like+this' },
        'Lisianthus': { status: '充滿希望的充能時刻', desc: '雖然有點累，但音符落下的瞬間，感覺明天又可以繼續加油了！', url: 'https://www.youtube.com/results?search_query=LUCY+Lisianthus' },
        'I No': { status: '看透生活後的自嘲與釋懷', desc: '「好啦，我知道了。」面對無奈，你選擇用溫柔的嘆息和幽默感放過自己。', url: 'https://www.youtube.com/results?search_query=盧廣仲+I+No' },
        '言不由衷': { status: '口是心非的遺憾與倔強', desc: '心裡明明很在意，表面上卻還要裝作若無其事。有些遺憾，只能唱進歌裡。', url: 'https://www.youtube.com/results?search_query=甜約翰+言不由衷' }
    };

    const contentBox = document.getElementById('content-box');
    const progressBar = document.getElementById('progress');

    function updateContent(htmlCode, step) {
        const progressPercentages = [0, 20, 40, 60, 80, 95, 100];
        progressBar.style.width = progressPercentages[step] + '%';
        contentBox.classList.remove('fade-in');
        void contentBox.offsetWidth;
        contentBox.innerHTML = htmlCode;
        contentBox.classList.add('fade-in');
    }

    // 初始化分數
    function resetScores() {
        for (let key in scores) scores[key] = 0;
    }

    function showStartPage() {
        resetScores();
        const html = `
            <h1>🎵 深夜的寂寞唱片行</h1>
            <p class="intro">凌晨兩點，你走在一條空無一人的街上，發現一家散發著微光的舊唱片行。<br>門口掛著一塊牌子：「進來吧，這裡有懂你的歌。」<br>你推開門走了進去……</p>
            <button class="btn" style="text-align:center; font-weight:bold; border-color:#ff4081;" onclick="showQ1()">開啟音樂處方箋</button>
        `;
        updateContent(html, 0);
    }

    // Q1: 環境氣氛
    function showQ1() {
        const html = `
            <div class="question-text">Q1. 走進店裡，空氣中飄散著一種味道，你覺得那最像是？</div>
            <button class="btn" onclick="addScore(['黑色台北','天堂與泥土','I No'], showQ2)">A. 潮濕的雨水與老舊紙張的味道，有些沉重。</button>
            <button class="btn" onclick="addScore(['ITEM','Morse Code','TATTOO'], showQ2)">B. 剛沖好的濃烈黑咖啡與微熱的機器過載味。</button>
            <button class="btn" onclick="addScore(['Just Like This','X Song','Lisianthus','言不由衷','BREATHE'], showQ2)">C. 淡淡的木質香薰，夾雜著一絲甜味。</button>
        `;
        updateContent(html, 1);
    }

    // Q2: 視覺與封面
    function showQ2() {
        const html = `
            <div class="question-text">Q2. 店長沒有招呼你，只是指了指旁邊的架子。第一張吸引你目光的黑膠封面是？</div>
            <button class="btn" onclick="addScore(['黑色台北','TATTOO','言不由衷'], showQ3)">A. 朦朧的深夜都市街景，霓虹燈失焦泛散。</button>
            <button class="btn" onclick="addScore(['天堂與泥土','I No','BREATHE'], showQ3)">B. 一片虛無的灰白色天空，或者模糊的黑白人影。</button>
            <button class="btn" onclick="addScore(['ITEM','Morse Code'], showQ3)">C. 充滿手繪感、色彩強烈且帶有衝撞感的塗鴉。</button>
            <button class="btn" onclick="addScore(['Just Like This','X Song','Lisianthus'], showQ3)">D. 溫暖的夕陽海灘，陽光灑在海面上的波光。</button>
        `;
        updateContent(html, 2);
    }

    // Q3: 店內互動事件 (新題目)
    function showQ3() {
        const html = `
            <div class="question-text">Q3. 這時，角落有一隻黑貓靜靜地走過來蹭你的腳，你下意識會怎麼做？</div>
            <button class="btn" onclick="addScore(['Just Like This','Lisianthus','I No'], showQ4)">A. 蹲下來溫柔地揉揉牠，跟牠對視，覺得被治癒了。</button>
            <button class="btn" onclick="addScore(['X Song','言不由衷','TATTOO'], showQ4)">B. 輕輕碰牠一下，心想「你是不是跟我一樣孤單？」</button>
            <button class="btn" onclick="addScore(['天堂與泥土','BREATHE','黑色台北'], showQ4)">C. 只是看著牠，嘆了一口氣，連伸手摸牠的力氣都沒有。</button>
            <button class="btn" onclick="addScore(['ITEM','Morse Code'], showQ4)">D. 輕快地逗逗牠，試圖跟牠玩起來。</button>
        `;
        updateContent(html, 3);
    }

    // Q4: 挑選耳機 (新題目)
    function showQ4() {
        const html = `
            <div class="question-text">Q4. 店長遞給你一副試聽耳機，這副耳機的外觀是？</div>
            <button class="btn" onclick="addScore(['ITEM','黑色台北','Morse Code'], showQ5)">A. 金屬感重、線條硬朗的專業監聽全罩式耳機。</button>
            <button class="btn" onclick="addScore(['TATTOO','言不由衷','X Song','Just Like This'], showQ5)">B. 帶有復古皮質軟墊、很有文青質感的木紋耳機。</button>
            <button class="btn" onclick="addScore(['天堂與泥土','BREATHE','I No','Lisianthus'], showQ5)">C. 看起來毫無裝飾、甚至有點磨損的極簡素色耳機。</button>
        `;
        updateContent(html, 4);
    }

    // Q5: 聽覺直覺
    function showQ5() {
        const html = `
            <div class="question-text">Q5. 戴上耳機，在音樂正式開始前，你最希望耳機裡先傳來什麼前奏聲音？</div>
            <button class="btn" onclick="addScore(['ITEM','黑色台北','Morse Code'], calculateResult)">A. 震撼心臟的重低音顆粒或強烈的鼓點節奏。</button>
            <button class="btn" onclick="addScore(['BREATHE','天堂與泥土','Just Like This','I No'], calculateResult)">B. 溫柔且安靜的單純鋼琴聲，或是吉他微弱的刷弦。</button>
            <button class="btn" onclick="addScore(['TATTOO','X Song','Lisianthus','言不由衷'], calculateResult)">C. 帶有微醺、迷幻感的電子合成器（Synth）鋪墊音效。</button>
        `;
        updateContent(html, 5);
    }

    // 輔助函式：幫選中的歌曲加分
    function addScore(songArray, nextFunction) {
        songArray.forEach(song => {
            if (scores[song] !== undefined) scores[song] += 1;
        });
        nextFunction();
    }

    // 計算得分最高的歌曲
    function calculateResult() {
        let maxScore = -1;
        let finalSong = 'Just Like This'; // 預設防呆

        for (let song in scores) {
            if (scores[song] > maxScore) {
                maxScore = scores[song];
                finalSong = song;
            }
        }
        showResult(finalSong);
    }

    function copyResult(songName, status) {
        const text = `🔮 我的深夜音樂處方箋已生成！\n\n【當下情緒】${status}\n【命定歌曲】🎧 ${songName}\n\n歡迎來到「深夜的寂寞唱片行」，領取屬於你的當下之歌吧！`;
        navigator.clipboard.writeText(text).then(() => {
            alert('處方箋已複製！快去發 Threads 或 IG 限動吧 😎');
        }).catch(() => {
            alert('複製失敗，請手動複製文字 Q_Q');
        });
    }

    function showResult(songName) {
        const song = songDatabase[songName];
        const html = `
            <h1>🔮 你的音樂處方箋已生成</h1>
            <div class="result-title">當下情緒狀態：${song.status}</div>
            <div class="song-title">🎧 ${songName}</div>
            <p class="intro">${song.desc}</p>
            
            <div class="action-group">
                <a href="${song.url}" target="_blank" class="action-btn yt-link">▶ 在 YouTube 聆聽</a>
                <button class="action-btn share-btn" onclick="copyResult('${songName}', '${song.status}')">📋 複製文字分享</button>
            </div>
            
            <button class="btn restart-btn" onclick="showStartPage()">重新測驗</button>
        `;
        updateContent(html, 6);
    }

    showStartPage();
</script>

</body>
</html>
