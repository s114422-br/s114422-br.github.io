<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不要嚇跑地瓜鳥！學測保衛戰 V6</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f1ea; 
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        #bird-container {
            width: 100%;
            height: 300px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background-color: #e9e4d9;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        #bird-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #status-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            min-height: 35px;
        }
        #score-board {
            font-size: 20px;
            margin: 15px 0;
            color: #555;
            background: #fdfcf9;
            padding: 10px;
            border-radius: 10px;
            line-height: 1.5;
        }
        
        /* 驚嚇度計量條 - 這次直接顯示，方便檢查有沒有動！ */
        #alert-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            height: 20px;
            border: 1px solid #ccc;
        }
        #alert-bar {
            width: 0%;
            height: 100%;
            background-color: #2e7d32;
            transition: width 0.05s linear;
        }

        #btn-approach {
            font-size: 26px;
            font-weight: bold;
            padding: 20px 60px;
            background-color: #7a5c42; 
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            
            /* 關閉所有可能干擾的預設點擊行為 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #btn-approach:active {
            background-color: #5d4632;
        }
        #disclaimer {
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
        .safe-text { color: #2e7d32; }
        .warning-text { color: #f57c00; font-weight: 900; }
        .danger-text { color: #d32f2f; font-weight: 900; }
        .win-text { color: #1565c0; font-weight: 900; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>🐦 地瓜鳥學測保衛戰 🍠</h2>
    <p style="color: #666; font-size: 15px;">核心規則：按住按鈕前進，驚嚇條會爆升！放開按鈕會冷靜。注意地瓜鳥的狀態！</p>
    
    <div id="bird-container">
        <img id="bird-image" src="https://upload.wikimedia.org/wikipedia/commons/d/df/Malayan_Night-Heron_-_Taiwan_S4E8695_%2817320173361%29.jpg" alt="地瓜鳥發呆">
    </div>
    
    <div style="font-size: 14px; text-align: left; margin-bottom: 5px; color: #666;">地瓜鳥警覺心：</div>
    <div id="alert-container">
        <div id="alert-bar"></div>
    </div>

    <div id="status-text" class="safe-text">地瓜鳥正在裝成一顆地瓜...</div>
    
    <div id="score-board">
        目前距離：<span id="distance">5.00</span> 公尺<br>
        預估學測分數：<span id="score">0</span> 級分
    </div>
    
    <button id="btn-approach" 
            onmousedown="startApproach()" 
            onmouseup="stopApproach()" 
            onmouseleave="stopApproach()"
            ontouchstart="startApproach()" 
            ontouchend="stopApproach()">
        按住悄悄靠近
    </button>
</div>

<div id="disclaimer">⚠️ 本遊戲僅供娛樂，祝福各位學測順利。</div>

<script>
    const birdImageEl = document.getElementById('bird-image');
    const statusTextEl = document.getElementById('status-text');
    const distanceEl = document.getElementById('distance');
    const scoreEl = document.getElementById('score');
    const btnApproach = document.getElementById('btn-approach');
    const alertBar = document.getElementById('alert-bar');

    const imgUrls = {
        safe: 'https://upload.wikimedia.org/wikipedia/commons/d/df/Malayan_Night-Heron_-_Taiwan_S4E8695_%2817320173361%29.jpg', 
        approaching: 'https://singaporebirds.com/wp-content/uploads/2021/07/malayan-night-heron-191113-103msdcf-fyp06483-n.jpg', 
        warning: 'https://i.ytimg.com/vi/cAKBKwohlZ8/maxresdefault.jpg', 
        danger: 'https://cdn.hk01.com/media/images/2330752/org/cb336fba1df445b2bcf4ef84a861f6c4.jpg', 
        flyaway: 'https://e-info.org.tw/images/01926580-a762-4428-8a12-26d8d8b250b8.jpg', 
        win: 'https://www.fju.edu.tw/showImg/focus/focus2137.jpg' 
    };

    let distance = 5.00;
    let score = 0;
    let gameState = 'SAFE'; 
    let isPressing = false;
    let alertLevel = 0; 

    // 使用最穩定的單一主循環，每 40 毫秒執行一次
    setInterval(function() {
        if (gameState === 'GAME_OVER' || gameState === 'WIN') return;

        // 1. 計算驚嚇值
        if (isPressing) {
            alertLevel += 2.5; // 按住時驚嚇值爬升
        } else {
            alertLevel -= 1.5; // 放開時驚嚇值冷卻
        }

        // 邊界限制
        if (alertLevel < 0) alertLevel = 0;
        if (alertLevel > 100) alertLevel = 100;

        // 更新驚嚇條視覺
        alertBar.style.width = alertLevel + '%';

        // 2. 判斷地瓜鳥狀態與換圖
        if (alertLevel <= 40) {
            gameState = 'SAFE';
            statusTextEl.innerText = '地瓜鳥正在裝成一顆地瓜...';
            statusTextEl.className = 'safe-text';
            birdImageEl.src = isPressing ? imgUrls.approaching : imgUrls.safe;
            alertBar.style.backgroundColor = '#2e7d32';
        } 
        else if (alertLevel > 40 && alertLevel <= 85) {
            gameState = 'WARNING';
            statusTextEl.innerText = '（警告：牠開始瘋狂扭脖子了！！）';
            statusTextEl.className = 'warning-text';
            birdImageEl.src = imgUrls.warning;
            alertBar.style.backgroundColor = '#f57c00';
        } 
        else if (alertLevel > 85) {
            gameState = 'DANGER';
            statusTextEl.innerText = '！！！牠轉過來狠瞪你了！！！';
            statusTextEl.className = 'danger-text';
            birdImageEl.src = imgUrls.danger;
            alertBar.style.backgroundColor = '#d32f2f';

            // 危險期只要玩家還在按，直接爆開
            if (isPressing) {
                gameState = 'GAME_OVER';
                birdImageEl.src = imgUrls.flyaway;
                statusTextEl.innerText = '地瓜鳥飛走了！學測扣 60 級分，重考班在等你了...😭';
                btnApproach.style.display = 'none'; // 直接隱藏按鈕防止再點
                return;
            }
        }

        // 3. 玩家前進扣距離
        if (isPressing && gameState !== 'DANGER') {
            if (distance > 0.05) {
                distance -= 0.05;
                score = Math.floor((5 - distance) * 12.5);
                if (score > 60) score = 60;

                distanceEl.innerText = distance.toFixed(2);
                scoreEl.innerText = score;
            } else {
                gameState = 'WIN';
                birdImageEl.src = imgUrls.win;
                statusTextEl.innerText = '✨ 你成功摸到了地瓜鳥！滿級分神話降臨！💯 ✨';
                statusTextEl.className = 'win-text';
                btnApproach.style.display = 'none';
            }
        }
    }, 40);

    // 觸發前進
    function startApproach() {
        if (gameState !== 'GAME_OVER' && gameState !== 'WIN') {
            isPressing = true;
            btnApproach.innerText = '正在悄悄靠近...';
        }
    }

    // 停止前進
    function stopApproach() {
        isPressing = false;
        if (gameState !== 'GAME_OVER' && gameState !== 'WIN') {
            btnApproach.innerText = '按住悄悄靠近';
        }
    }
</script>

</body>
</html>
