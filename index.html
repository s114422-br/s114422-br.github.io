<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 雲端天竺鼠養成日記 🐾</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdfbf7, #eef5f3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }

        .game-container {
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            width: 400px;
            text-align: center;
            border: 4px solid #e2d4c9;
        }

        h1 {
            font-size: 24px;
            color: #8d6e63;
            margin-top: 0;
        }

        /* 顏色選擇器 */
        .color-picker {
            margin-bottom: 20px;
        }
        .color-btn {
            border: none;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .color-btn:hover { transform: scale(1.05); }
        #btn-tricolor { background-color: #d7ccc8; color: #5d4037; }
        #btn-cream { background-color: #fff9c4; color: #fbc02d; }
        #btn-agouti { background-color: #cfd8dc; color: #455a64; }

        /* 天竺鼠舞台 */
        .stage {
            height: 200px;
            position: relative;
            background-color: #f5f5f5;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 天竺鼠本體 (純CSS繪製) */
        .guinea-pig {
            width: 150px;
            height: 100px;
            border-radius: 70px 90px 60px 60px;
            position: relative;
            transition: all 0.5s ease, transform 0.1s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 毛色樣式 */
        .tricolor { background: linear-gradient(90deg, #5d4037 30%, #ffffff 30%, #ffffff 70%, #ffa726 70%); }
        .cream { background: linear-gradient(90deg, #fff59d 40%, #fff9c4 40%); }
        .agouti { background: linear-gradient(90deg, #8d6e63 50%, #b0bec5 50%); }

        /* 五官與裝飾 */
        .ear {
            position: absolute;
            top: -10px;
            left: 30px;
            width: 25px;
            height: 25px;
            background-color: #ff8a80;
            border-radius: 50%;
            z-index: -1;
        }
        .eye {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 12px;
            height: 12px;
            background-color: #212121;
            border-radius: 50%;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
        }
        .nose {
            position: absolute;
            top: 40px;
            left: -2px;
            width: 10px;
            height: 8px;
            background-color: #ff8a80;
            border-radius: 50%;
        }

        /* 動畫特效 */
        @keyframes eating {
            0% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.05) translateX(-5px); }
            100% { transform: scale(1) translateX(0); }
        }
        @keyframes petting {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.95) translateY(5px); }
            100% { transform: scale(1) translateY(0); }
        }
        .is-eating { animation: eating 0.3s cubic-bezier(.36,.07,.19,.97) double; }
        .is-petting { animation: petting 0.2s ease-in-out; }

        /* 漂浮文字 (515151、PuiPui) */
        .floating-text {
            position: absolute;
            color: #ff7043;
            font-weight: bold;
            font-size: 18px;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        /* 狀態條 */
        .status-container {
            margin-bottom: 20px;
            text-align: left;
        }
        .status-bar {
            background-color: #e0e0e0;
            height: 15px;
            border-radius: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            width: 100%;
            background-color: #81c784;
            transition: width 0.3s ease;
        }
        #happiness-bar { background-color: #ffb74d; }

        /* 按鈕區 */
        .action-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .action-btn {
            border: none;
            padding: 12px;
            border-radius: 12px;
            background-color: #8d6e63;
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #5d4037;
            transition: all 0.1s;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .action-btn:hover { background-color: #795548; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🐹 雲端天竺鼠模擬器 🐹</h1>

    <!-- 選擇毛色 -->
    <div class="color-picker">
        <button class="color-btn" id="btn-tricolor" onclick="changeColor('tricolor')">經典三色</button>
        <button class="color-btn" id="btn-cream" onclick="changeColor('cream')">奶油禮服</button>
        <button class="color-btn" id="btn-agouti" onclick="changeColor('agouti')">野生水豚色</button>
    </div>

    <!-- 天竺鼠互動舞台 -->
    <div class="stage" id="stage">
        <div class="guinea-pig tricolor" id="pig" onclick="petPig()">
            <div class="ear"></div>
            <div class="eye"></div>
            <div class="nose"></div>
        </div>
    </div>

    <!-- 狀態數值 -->
    <div class="status-container">
        <div>🌾 飽食度: <span id="hunger-text">100</span>%</div>
        <div class="status-bar"><div id="hunger-bar" class="progress"></div></div>
        
        <div>❤️ 幸福感: <span id="happiness-text">100</span>%</div>
        <div class="status-bar"><div id="happiness-bar" class="progress"></div></div>
    </div>

    <!-- 行動指令 -->
    <div class="action-container">
        <button class="action-btn" onclick="feedPig('grass')">🌾 餵提摩西草</button>
        <button class="action-btn" onclick="feedPig('food')">🥕 餵美味飼料</button>
        <button class="action-btn" onclick="petPig()">🫳 嚕天竺鼠</button>
    </div>
</div>

<script>
    // 遊戲狀態數據
    let hunger = 100;
    let happiness = 100;
    const pig = document.getElementById('pig');
    const stage = document.getElementById('stage');

    // 變更天竺鼠毛色
    function changeColor(colorClass) {
        pig.className = 'guinea-pig ' + colorClass;
        createFloatingText('變身！✨');
    }

    // 餵食功能
    function feedPig(type) {
        if (hunger >= 100) {
            createFloatingText('吃不下了... 💤');
            return;
        }

        pig.classList.add('is-eating');
        setTimeout(() => pig.classList.remove('is-eating'), 300);

        if (type === 'grass') {
            hunger = Math.min(100, hunger + 15);
            createFloatingText('嚼嚼嚼...🌾');
        } else if (type === 'food') {
            hunger = Math.min(100, hunger + 25);
            happiness = Math.min(100, happiness + 10);
            createFloatingText('Pui! 好吃! 🥕');
        }
        updateStatus();
    }

    // 嚕天竺鼠（摸摸）
    function petPig() {
        happiness = Math.min(100, happiness + 15);
        
        pig.classList.add('is-petting');
        setTimeout(() => pig.classList.remove('is-petting'), 200);

        const sounds = ['Pui Pui! 💕', '515151~ 🥰', '（舒服到變吐司）', '啾啾！'];
        const randomSound = sounds[Math.floor(Math.random() * sounds.length)];
        createFloatingText(randomSound);
        
        updateStatus();
    }

    // 更新狀態條與文字
    function updateStatus() {
        document.getElementById('hunger-text').innerText = Math.floor(hunger);
        document.getElementById('hunger-bar').style.width = hunger + '%';
        
        document.getElementById('happiness-text').innerText = Math.floor(happiness);
        document.getElementById('happiness-bar').style.width = happiness + '%';
    }

    // 產生飄浮文字特效
    function createFloatingText(text) {
        const txtEl = document.createElement('div');
        txtEl.className = 'floating-text';
        txtEl.innerText = text;
        
        // 隨機在天竺鼠附近產生
        const randomX = Math.random() * 60 + 100;
        txtEl.style.left = randomX + 'px';
        txtEl.style.top = '40px';
        
        stage.appendChild(txtEl);
        
        // 動畫結束後自動刪除，避免佔記憶體
        setTimeout(() => {
            txtEl.remove();
        }, 800);
    }

    // 模擬時間流逝（每 3 秒肚子變餓、心情變差一點點）
    setInterval(() => {
        hunger = Math.max(0, hunger - 2);
        happiness = Math.max(0, happiness - 1.5);
        updateStatus();
        
        if (hunger < 30) {
            if(Math.random() > 0.7) createFloatingText('主人我餓了... 🥺');
        }
    }, 3000);
</script>

</body>
</html>
